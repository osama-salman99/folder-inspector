name: Verify Code
on:
  pull_request:
    branches:
      - 'main'
  push:
    branches:
      - 'main'
jobs:
  verify_code:
    name: Verify Code
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: "JDK set-up"
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
      - name: "Install Xvfb for headless JavaFX/TestFX"
        run: sudo apt-get update && sudo apt-get install -y xvfb
      - name: "Run verify under Xvfb"
        run: xvfb-run -a mvn clean verify